name = "poeconomy-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
AWS_API_GATEWAY_URL = "https://your-api-id.execute-api.us-west-2.amazonaws.com/prod"
CACHE_TTL = "300"
RATE_LIMIT_PER_MINUTE = "60"

# KV namespaces - you need to create these in Cloudflare dashboard and replace the IDs
# Run: wrangler kv:namespace create "CACHE_KV" and "RATE_LIMIT_KV"
[[kv_namespaces]]
binding = "CACHE_KV"
id = "your-cache-kv-namespace-id"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your-rate-limit-kv-namespace-id"

[env.production]
name = "poeconomy-api"
route = "https://api.poeconomy.com/*"

[[env.production.kv_namespaces]]
binding = "CACHE_KV"
id = "your-production-cache-kv-namespace-id"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your-production-rate-limit-kv-namespace-id"

[env.production.vars]
AWS_API_GATEWAY_URL = "https://your-production-api-id.execute-api.us-west-2.amazonaws.com/prod"
CACHE_TTL = "300"
RATE_LIMIT_PER_MINUTE = "60"
