[mypy]
# Global options
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True
show_error_codes = True
show_column_numbers = True
show_error_context = True
pretty = True

# Per-module options
[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-lightgbm.*]
ignore_missing_imports = True

[mypy-xgboost.*]
ignore_missing_imports = True

[mypy-optuna.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-joblib.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-seaborn.*]
ignore_missing_imports = True

# Local modules
[mypy-ml.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True

[mypy-ml.config.*]
disallow_untyped_defs = True

[mypy-ml.utils.*]
disallow_untyped_defs = True

[mypy-ml.pipelines.*]
disallow_untyped_defs = True

[mypy-ml.services.*]
disallow_untyped_defs = True

[mypy-ml.scripts.*]
disallow_untyped_defs = True

[mypy-aws.*]
disallow_untyped_defs = True

# Test files (if any)
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

# Ignore specific files that are not ready for strict typing
[mypy-debug_filtering]
disallow_untyped_defs = False
